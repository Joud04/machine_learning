<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssistKB — Assistant Interne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .message-appear { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans text-slate-900">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2 rounded-lg">
                <i class="fas fa-robot text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-slate-800">AssistKB <span class="text-indigo-600 text-sm font-medium px-2 py-0.5 bg-indigo-50 rounded-full border border-indigo-100 ml-2">v1.0</span></h1>
        </div>
        <div class="text-xs text-slate-400 font-medium">RAG Engine: Qdrant + Groq</div>
    </header>

    <!-- Main Chat Area -->
    <main class="flex-1 overflow-hidden flex flex-col md:flex-row">
        <!-- Chat window -->
        <div class="flex-1 flex flex-col h-full bg-slate-50">
            <div id="chat-window" class="chat-container flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
                <!-- Welcome Message -->
                <div class="flex gap-3 max-w-3xl mx-auto w-full message-appear">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center shrink-0">
                        <i class="fas fa-robot text-xs"></i>
                    </div>
                    <div class="bg-white border border-slate-200 p-4 rounded-2xl rounded-tl-none shadow-sm text-slate-700">
                        Bonjour ! Je suis <strong>AssistKB</strong>. Je peux répondre à vos questions en me basant uniquement sur la documentation interne de l'entreprise. Que souhaitez-vous savoir ?
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 md:p-6 bg-white border-t border-slate-200">
                <form id="chat-form" class="max-w-3xl mx-auto flex gap-3">
                    <input
                        type="text"
                        id="user-input"
                        placeholder="Posez votre question ici..."
                        class="flex-1 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-slate-700"
                        autocomplete="off"
                    >
                    <button
                        type="submit"
                        id="send-btn"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-3 rounded-xl font-semibold transition-colors flex items-center gap-2 shrink-0"
                    >
                        <span>Envoyer</span>
                        <i class="fas fa-paper-plane text-sm"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- Sources Panel (Right Side) -->
        <aside id="sources-panel" class="hidden md:flex w-80 bg-white border-l border-slate-200 flex-col overflow-hidden">
            <div class="p-4 border-b border-slate-200 flex items-center justify-between bg-slate-50">
                <h2 class="font-semibold text-slate-700 flex items-center gap-2">
                    <i class="fas fa-book-open text-indigo-500"></i> Sources citées
                </h2>
                <span id="source-count" class="text-xs bg-slate-200 text-slate-600 px-2 py-1 rounded-full">0</span>
            </div>
            <div id="sources-list" class="flex-1 overflow-y-auto p-4 space-y-3">
                <p class="text-slate-400 text-sm italic text-center mt-10">Aucune source pour le moment.</p>
            </div>
        </aside>
    </main>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sourcesPanel = document.getElementById('sources-panel');
        const sourcesList = document.getElementById('sources-list');
        const sourceCount = document.getElementById('source-count');

        function addMessage(content, isUser = false, sources = []) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex gap-3 max-w-3xl mx-auto w-full message-appear ${isUser ? 'flex-row-reverse' : ''}`;

            const avatar = isUser
                ? `<div class="w-8 h-8 rounded-full bg-slate-800 text-white flex items-center justify-center shrink-0"><i class="fas fa-user text-xs"></i></div>`
                : `<div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center shrink-0"><i class="fas fa-robot text-xs"></i></div>`;

            const bubbleClass = isUser
                ? 'bg-indigo-600 text-white rounded-2xl rounded-tr-none shadow-md'
                : 'bg-white border border-slate-200 text-slate-700 rounded-2xl rounded-tl-none shadow-sm';

            wrapper.innerHTML = `
                ${avatar}
                <div class="${bubbleClass} p-4">
                    <div class="whitespace-pre-wrap">${content}</div>
                </div>
            `;

            chatWindow.appendChild(wrapper);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });

            if (!isUser && sources && sources.length > 0) {
                updateSources(sources);
            }
        }

        function updateSources(sources) {
            sourcesPanel.classList.remove('hidden');
            sourcesPanel.classList.add('flex');
            sourceCount.innerText = sources.length;
            sourcesList.innerHTML = '';

            sources.forEach((s, index) => {
                const item = document.createElement('div');
                item.className = 'p-3 bg-slate-50 border border-slate-200 rounded-lg hover:border-indigo-300 transition-colors group cursor-default';
                item.innerHTML = `
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-xs font-bold text-indigo-600 bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-100">Source ${index + 1}</span>
                        <span class="text-[10px] text-slate-400 uppercase font-semibold tracking-wider">Score: ${s.score}</span>
                    </div>
                    <div class="text-sm text-slate-600 truncate font-medium" title="${s.source}">${s.source}</div>
                    <div class="text-[10px] text-slate-400 mt-1">Position: ${s.position}</div>
                `;
                sourcesList.appendChild(item);
            });
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            addMessage(text, true);

            // Loading state
            sendBtn.disabled = true;
            sendBtn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i>`;

            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'flex gap-3 max-w-3xl mx-auto w-full message-appear';
            loadingMsg.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center shrink-0"><i class="fas fa-robot text-xs"></i></div>
                <div class="bg-white border border-slate-200 p-4 rounded-2xl rounded-tl-none shadow-sm text-slate-400 italic">
                    Réflexion en cours...
                </div>
            `;
            chatWindow.appendChild(loadingMsg);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });

                const data = await response.json();
                chatWindow.removeChild(loadingMsg);

                if (response.ok) {
                    addMessage(data.answer, false, data.sources);
                } else {
                    addMessage(`Erreur: ${data.detail || 'Une erreur est survenue.'}`, false);
                }
            } catch (err) {
                chatWindow.removeChild(loadingMsg);
                addMessage(`Erreur de connexion au serveur.`, false);
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = `<span>Envoyer</span><i class="fas fa-paper-plane text-sm"></i>`;
            }
        };
    </script>
</body>
</html>
